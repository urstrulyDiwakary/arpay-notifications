# =============================================================================
# Prometheus Configuration for ARPAY Notifications
# =============================================================================

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: 'arpay-notifications'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional)
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # =============================================================================
  # Prometheus Self-Monitoring
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          application: 'prometheus'

  # =============================================================================
  # ARPAY Notifications Application
  # =============================================================================
  - job_name: 'arpay-notifications'
    static_configs:
      - targets: ['app:8086']
        labels:
          application: 'arpay-notifications'
          component: 'backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s

  # =============================================================================
  # PostgreSQL Exporter (Optional - add postgres-exporter service)
  # =============================================================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          application: 'arpay-notifications'
          component: 'database'
    scrape_interval: 30s

  # =============================================================================
  # Redis Exporter (Optional - add redis-exporter service)
  # =============================================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          application: 'arpay-notifications'
          component: 'cache'
    scrape_interval: 30s

  # =============================================================================
  # Node Exporter (Host metrics - Optional)
  # =============================================================================
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          application: 'arpay-notifications'
          component: 'host'
    scrape_interval: 30s
