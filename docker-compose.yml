# =============================================================================
# ARPAY Notifications - Docker Compose Configuration
# Supports: local development, staging, and production deployments
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application Service
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: arpay-notifications:${APP_VERSION:-latest}
    container_name: arpay-notifications-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8086}:8086"
    environment:
      # Spring Profile
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-production}
      
      # Server Configuration
      - SERVER_PORT=8086
      
      # Database Configuration
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-ARPAY}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-arpay_notifications}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      
      # Redis Configuration
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # Firebase Configuration
      - FIREBASE_ENABLED=${FIREBASE_ENABLED:-true}
      - FIREBASE_SERVICE_ACCOUNT_KEY_PATH=/app/firebase/firebase-service-account.json
      
      # JWT Security
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-172800000}
      
      # Internal API Authentication
      - INTERNAL_API_KEYS=${INTERNAL_API_KEYS:-}

      # Email Configuration
      - SPRING_MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - SPRING_MAIL_PORT=${MAIL_PORT:-587}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME:-}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD:-}

      # CORS Configuration
      - CORS_ORIGINS=${CORS_ORIGINS}
      
      # Rate Limiting
      - NOTIFICATIONS_RATELIMIT_ENABLED=${NOTIFICATIONS_RATELIMIT_ENABLED:-true}
      - NOTIFICATIONS_RATELIMIT_GLOBAL_PERMITS_PER_SECOND=${NOTIFICATIONS_RATELIMIT_GLOBAL_PERMITS_PER_SECOND:-1000}
      - NOTIFICATIONS_RATELIMIT_PER_ENDPOINT_PERMITS_PER_SECOND=${NOTIFICATIONS_RATELIMIT_PER_ENDPOINT_PERMITS_PER_SECOND:-100}
      - NOTIFICATIONS_RATELIMIT_PER_CLIENT_PERMITS_PER_SECOND=${NOTIFICATIONS_RATELIMIT_PER_CLIENT_PERMITS_PER_SECOND:-10}
      
      # Logging
      - LOGGING_LEVEL_ROOT=${LOGGING_LEVEL_ROOT:-INFO}
      - LOGGING_LEVEL_COM_ARPAY=${LOGGING_LEVEL_COM_ARPAY:-INFO}
    volumes:
      # Firebase credentials — populate via Coolify persistent storage or docker volume
      - firebase-credentials:/app/firebase
      # Mount logs directory
      - app-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arpay-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: arpay-notifications-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-ARPAY}
      - POSTGRES_USER=${DB_USERNAME:-arpay_notifications}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups/postgres:/backups:rw
    networks:
      - arpay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-arpay_notifications} -d ${DB_NAME:-ARPAY}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Redis Cache/Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: arpay-notifications-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
      - ./backups/redis:/backups:rw
    networks:
      - arpay-network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (Optional - for standalone deployments)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: arpay-notifications-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - arpay-network
    profiles:
      - with-nginx

  # ---------------------------------------------------------------------------
  # Prometheus Monitoring (Optional)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: arpay-notifications-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - arpay-network
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # Grafana Dashboard (Optional)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: arpay-notifications-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - arpay-network
    profiles:
      - monitoring

# =============================================================================
# Networks
# =============================================================================
networks:
  arpay-network:
    driver: bridge
    name: arpay-notifications-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    name: arpay-notifications-postgres-data
  redis-data:
    name: arpay-notifications-redis-data
  firebase-credentials:
    name: arpay-notifications-firebase-credentials
  app-logs:
    name: arpay-notifications-app-logs
  nginx-logs:
    name: arpay-notifications-nginx-logs
  prometheus-data:
    name: arpay-notifications-prometheus-data
  grafana-data:
    name: arpay-notifications-grafana-data
