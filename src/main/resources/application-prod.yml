# =============================================================================
# ARPAY Notifications — PROD Profile
# Production-hardened: strict validation, tuned pools, minimal logging.
# Activate with:  SPRING_PROFILES_ACTIVE=prod  or  --spring.profiles.active=prod
#
# All sensitive values MUST be overridden via environment variables.
# The ConfigurationValidator will BLOCK startup if defaults are still in place.
# =============================================================================

server:
  shutdown: graceful
  forward-headers-strategy: framework
  tomcat:
    threads:
      max: 200
      min-spare: 20
    max-connections: 8192
    accept-count: 100
    connection-timeout: 20000
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto

spring:
  lifecycle:
    timeout-per-shutdown-phase: 60s

  # ── Database ────────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ARPAY}}
    username: ${DB_USERNAME:arpay_notifications}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      connection-test-query: SELECT 1
      pool-name: ArpayNotificationsHikariPool
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate          # NEVER auto-update in prod
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        generate_statistics: false
    open-in-view: false

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration

  # ── Redis ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 5

  # ── Mail ────────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp:
        auth: true
        starttls.enable: true
        starttls.required: true
        connectiontimeout: 10000
        timeout: 30000
        writetimeout: 30000

  # ── Request limits ──────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ── Firebase ──────────────────────────────────────────────────────────────────
firebase:
  enabled: ${FIREBASE_ENABLED:true}
  service-account-key-path: ${FIREBASE_SERVICE_ACCOUNT_KEY_PATH:/app/firebase/firebase-service-account.json}

# ── Worker pools (production scale) ──────────────────────────────────────────
notification:
  worker:
    critical-threads: 8
    normal-threads: 16
    low-threads: 5
    max-inflight: 500
    queue-capacity: 1000
  retry:
    max-attempts: 5
  dedup:
    ttl-seconds: 7200

# ── Scheduler intervals & tuning ─────────────────────────────────────────────
notifications:
  simple-mode: ${NOTIFICATIONS_SIMPLE_MODE:false}
  ratelimit:
    enabled: true
    global-permits-per-second: 2000
    per-endpoint-permits-per-second: 200
    per-client-permits-per-second: 20
  worker:
    backpressure:
      enabled: true
      max-queue-depth: 20000
  dlq:
    retry:
      enabled: true
      batch-size: 200
      interval-ms: 300000          # 5 minutes
      base-delay-seconds: 120
      max-cycles: 5
    cleanup:
      cron: "0 0 2 * * ?"
  outbox:
    retry:
      enabled: true
      interval-ms: 300000          # 5 minutes
      max-attempts: 5
    cleanup:
      cron: "0 0 3 * * ?"
  push-circuit:
    enabled: true
    failure-rate-threshold: 0.40
    min-samples: 50
    cooldown-seconds: 180
    window-seconds: 120
  alert:
    dlq-size-threshold: 200
    queue-delay-threshold-seconds: 60
    push-failure-rate-threshold: 0.05
    sla-failed-threshold: 5

# ── Security ──────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:}             # MUST be set via env
  expiration: ${JWT_EXPIRATION_MS:172800000}

internal:
  api:
    keys: ${INTERNAL_API_KEYS:}      # MUST be set via env
    header: X-API-Key

cors:
  allowed-origins: ${CORS_ORIGINS:https://arpay.anantarealty.in,https://api.arpay.anantarealty.in,https://notify.arpay.anantarealty.in}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,X-API-Key,X-Request-ID
  allow-credentials: true
  max-age: 3600

# ── Monitoring ────────────────────────────────────────────────────────────────
monitoring:
  alert:
    enabled: true
    success-rate-threshold: 95.0
    dlq-size-threshold: 100
  check:
    interval-ms: 180000

# ── Actuator (restricted) ────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
        exclude: env,beans,threaddump,heapdump
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: db,redis
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

# ── Logging (minimal) ────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.arpay: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.springframework.data.redis: WARN
    org.springframework.security: WARN
    io.lettuce: WARN
  file:
    name: /app/logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB

# ── Backend ───────────────────────────────────────────────────────────────────
arpay:
  backend:
    base-url: ${ARPAY_BACKEND_URL:https://api.arpay.anantarealty.in}

