# =============================================================================
# ARPAY Notifications Service - PRODUCTION Configuration
# Security-hardened configuration for production deployment
# All sensitive values MUST be overridden via environment variables
# =============================================================================
spring.application.name=arpay-notifications
spring.config.activate.on-profile=production

# ==========================================================================
# Server Configuration - Production Security
# ==========================================================================
server.port=${SERVER_PORT:8086}
server.shutdown=graceful
server.forward-headers-strategy=framework

# SSL Configuration (enable when not using reverse proxy)
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:}
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3
server.ssl.ciphers=TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256

# Tomcat hardening
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.max-connections=8192
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# ==========================================================================
# Database Configuration - PostgreSQL Production Settings
# ==========================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ARPAY}}
spring.datasource.username=${DB_USERNAME:arpay_notifications}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool - Production Tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=ArpayNotificationsHikariPool

# JPA/Hibernate Production Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.generate_statistics=false

# Flyway Migration Settings
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Silence JDBC repositories when using JPA
spring.data.jdbc.repositories.enabled=false

# ==========================================================================
# Redis Configuration - Production Settings
# ==========================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.connect-timeout=5000ms
spring.data.redis.timeout=10000ms
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=30
spring.data.redis.lettuce.pool.max-idle=15
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=10000ms

# ==========================================================================
# Firebase Cloud Messaging (FCM) Configuration
# ==========================================================================
firebase.enabled=${FIREBASE_ENABLED:true}
firebase.service-account-key-path=${FIREBASE_SERVICE_ACCOUNT_KEY_PATH:/app/firebase/firebase-service-account.json}

# ==========================================================================
# Email Configuration (SMTP) - Production
# ==========================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# ==========================================================================
# Notification Worker Configuration - Production Tuning
# ==========================================================================
notifications.simple-mode=${NOTIFICATIONS_SIMPLE_MODE:false}
notifications.simple-mode.push=${NOTIFICATIONS_SIMPLE_MODE_PUSH:true}

# Async Worker Thread Pools - Production Scaling
notification.worker.enabled=true
notification.worker.critical-threads=8
notification.worker.normal-threads=16
notification.worker.low-threads=5
notification.worker.max-inflight=500
notification.worker.queue-capacity=1000
notification.worker.poll-timeout-ms=500
notification.worker.scale.max-critical=32
notification.worker.scale.max-normal=64

# Backpressure Control - Production
notifications.worker.backpressure.enabled=true
notifications.worker.backpressure.max-queue-depth=20000

# API Rate Limiting - Production
notifications.ratelimit.enabled=true
notifications.ratelimit.global-permits-per-second=2000
notifications.ratelimit.per-endpoint-permits-per-second=200
notifications.ratelimit.per-client-permits-per-second=20

# Active Monitoring & Alerting
monitoring.alert.enabled=true
monitoring.alert.success-rate-threshold=95.0
monitoring.alert.dlq-size-threshold=100
monitoring.check.interval-ms=180000

# Alerting Configuration
alerting.enabled=true
alerting.slack.webhook-url=${SLACK_WEBHOOK_URL:}

# Redis Queue Names
notification.queue.critical=notification:queue:critical
notification.queue.normal=notification:queue:normal
notification.queue.low=notification:queue:low
notification.dlq=notification:dlq

# Retry Configuration
notification.retry.max-attempts=5
notification.dedup.ttl-seconds=7200

# ==========================================================================
# Rate Limiting Configuration - Production
# ==========================================================================
notifications.rate-limit.enabled=true
notifications.rate-limit.window-seconds=60
notifications.rate-limit.payment=200
notifications.rate-limit.approval=200
notifications.rate-limit.system=500

# ==========================================================================
# DLQ Auto-Retry Configuration - Production
# ==========================================================================
notifications.dlq.retry.enabled=true
notifications.dlq.retry.batch-size=200
notifications.dlq.retry.interval-ms=300000
notifications.dlq.retry.base-delay-seconds=120
notifications.dlq.retry.max-cycles=5
notifications.dlq.cleanup.cron=0 0 2 * * ?

# Outbox Retry Configuration
notifications.outbox.retry.enabled=true
notifications.outbox.retry.interval-ms=300000
notifications.outbox.retry.max-attempts=5
notifications.outbox.cleanup.cron=0 0 3 * * ?

# ==========================================================================
# Processing Lock Configuration
# ==========================================================================
notifications.processing-lock.ttl-seconds=180
notifications.processing-lock.cleanup-age-seconds=600

# ==========================================================================
# Recovery Scheduler Configuration
# ==========================================================================
notifications.recovery.enabled=true
notifications.recovery.stuck-seconds=180
notifications.self-healing.cleanup-locks.enabled=true

# ==========================================================================
# Push Circuit Breaker Configuration - Production
# ==========================================================================
notifications.push-circuit.enabled=true
notifications.push-circuit.failure-rate-threshold=0.40
notifications.push-circuit.min-samples=50
notifications.push-circuit.cooldown-seconds=180
notifications.push-circuit.window-seconds=120

# ==========================================================================
# Alert Thresholds - Production
# ==========================================================================
notifications.alert.dlq-size-threshold=200
notifications.alert.queue-delay-threshold-seconds=60
notifications.alert.push-failure-rate-threshold=0.05
notifications.alert.sla-failed-threshold=5

# ==========================================================================
# JWT Configuration - PRODUCTION (MUST override via env vars)
# ==========================================================================
jwt.secret=${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION_USE_64_CHAR_RANDOM_STRING}
jwt.expiration=${JWT_EXPIRATION_MS:172800000}
jwt.header=Authorization
jwt.prefix=Bearer 

# ==========================================================================
# Internal API Authentication - PRODUCTION (MUST override via env vars)
# ==========================================================================
internal.api.keys=${INTERNAL_API_KEYS:CHANGE_THIS_IN_PRODUCTION}
internal.api.header=X-API-Key
internal.api.excluded-paths=/actuator/health,/actuator/info,/api/notifications/tokens/**

# ==========================================================================
# CORS Configuration - PRODUCTION (Restrict to specific domains)
# ==========================================================================
cors.allowed-origins=${CORS_ORIGINS:https://arpay.anantarealty.in,https://api.arpay.anantarealty.in,https://notify.arpay.anantarealty.in}
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-API-Key,X-Request-ID
cors.exposed-headers=X-Request-ID,X-Total-Count
cors.allow-credentials=true
cors.max-age=3600

# ==========================================================================
# Actuator & Metrics - Production Security
# ==========================================================================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.exposure.exclude=env,beans,threaddump,heapdump
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.endpoint.info.enabled=true
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=db,redis
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.sla.http.server.requests=50ms,100ms,250ms,500ms,1s
management.endpoint.prometheus.enabled=true

# Health Check Probes for Kubernetes/Coolify
management.health.db.enabled=true
management.health.redis.enabled=true
management.health.ping.enabled=true

# ==========================================================================
# Logging Configuration - Production
# ==========================================================================
logging.level.root=INFO
logging.level.com.arpay=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.data.redis=WARN
logging.level.org.springframework.security=WARN
logging.level.io.lettuce=WARN

# JSON Logging for Production (structured logs)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Log file configuration
logging.file.name=/app/logs/application.log
logging.file.max-size=100MB
logging.file.max-history=30
logging.file.total-size-cap=3GB

# ==========================================================================
# Arpay Backend URL - Production
# ==========================================================================
arpay.backend.base-url=${ARPAY_BACKEND_URL:https://api.arpay.anantarealty.in}
arpay.backend.connect-timeout=10000
arpay.backend.read-timeout=30000

# ==========================================================================
# Security Headers (via filter or reverse proxy)
# ==========================================================================
# These should be set by Nginx, but can also be set here:
# X-Content-Type-Options: nosniff
# X-Frame-Options: DENY
# X-XSS-Protection: 1; mode=block
# Strict-Transport-Security: max-age=31536000; includeSubDomains
# Content-Security-Policy: default-src 'self'
# Referrer-Policy: strict-origin-when-cross-origin

# ==========================================================================
# Request/Response Limits
# ==========================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB

# ==========================================================================
# Graceful Shutdown
# ==========================================================================
spring.lifecycle.timeout-per-shutdown-phase=60s
