# ==========================================================================
# ARPAY Notifications Service Configuration
# All values can be overridden via environment variables.
# ==========================================================================
spring.application.name=arpay-notifications

# ==========================================================================
# Server Configuration
# ==========================================================================
server.port=${SERVER_PORT:8086}

# ==========================================================================
# Database Configuration - PostgreSQL
# ==========================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ARPAY}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# Silence Spring Data JDBC repository bootstrap when JPA is the intended data store.
spring.data.jdbc.repositories.enabled=false

# ==========================================================================
# Redis Configuration - For notification queue/cache
# ==========================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.connect-timeout=3000ms
spring.data.redis.timeout=10000ms
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=4

# ==========================================================================
# Firebase Cloud Messaging (FCM) Configuration
# ==========================================================================
firebase.enabled=${FIREBASE_ENABLED:true}
firebase.service-account-key-path=${FIREBASE_SERVICE_ACCOUNT_KEY_PATH:classpath:firebase/firebase-service-account.json}

# ==========================================================================
# Email Configuration (SMTP)
# ==========================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================================================
# Notification Worker Configuration
# ==========================================================================
notifications.simple-mode=${NOTIFICATIONS_SIMPLE_MODE:false}
notifications.simple-mode.push=${NOTIFICATIONS_SIMPLE_MODE_PUSH:true}

# Async Worker Thread Pools
notification.worker.enabled=true
notification.worker.critical-threads=5
notification.worker.normal-threads=10
notification.worker.low-threads=3
notification.worker.max-inflight=200
notification.worker.queue-capacity=500
notification.worker.poll-timeout-ms=1000
notification.worker.scale.max-critical=16
notification.worker.scale.max-normal=32

# Backpressure Control
notifications.worker.backpressure.enabled=true
notifications.worker.backpressure.max-queue-depth=10000
# How often BackpressureMonitor checks queue depth and adjusts rate limiter (ms)
notifications.backpressure.check-interval-ms=5000

# API Rate Limiting (Real Backpressure at Intake)
notifications.ratelimit.enabled=true
notifications.ratelimit.global-permits-per-second=1000
notifications.ratelimit.per-endpoint-permits-per-second=100
notifications.ratelimit.per-client-permits-per-second=10

# Active Monitoring & Alerting
monitoring.alert.enabled=true
monitoring.alert.success-rate-threshold=90.0
monitoring.alert.dlq-size-threshold=50
monitoring.check.interval-ms=300000

# Queue Metrics Collection
notifications.metrics.collection-interval-ms=5000

# Hard Limits Alerting
notifications.alerting.check-interval-ms=30000

# Time-to-Recovery Tracking
notifications.recovery.check-interval-ms=5000

# Alerting Configuration
alerting.enabled=true
alerting.slack.webhook-url=${SLACK_WEBHOOK_URL:}

# Redis Queue Names
notification.queue.critical=notification:queue:critical
notification.queue.normal=notification:queue:normal
notification.queue.low=notification:queue:low
notification.dlq=notification:dlq

# Retry Configuration
notification.retry.max-attempts=3
notification.dedup.ttl-seconds=3600

# ==========================================================================
# Rate Limiting Configuration
# ==========================================================================
notifications.rate-limit.enabled=true
notifications.rate-limit.window-seconds=60
notifications.rate-limit.payment=120
notifications.rate-limit.approval=120
notifications.rate-limit.system=300

# ==========================================================================
# DLQ Auto-Retry Configuration
# ==========================================================================
notifications.dlq.retry.enabled=true
notifications.dlq.retry.batch-size=100
# Interval in milliseconds (default: 300000 = 5 minutes) to reduce log noise
notifications.dlq.retry.interval-ms=300000
notifications.dlq.retry.base-delay-seconds=60
notifications.dlq.retry.max-cycles=3
notifications.dlq.cleanup.cron=0 0 2 * * ?

# Outbox Retry Configuration
notifications.outbox.retry.enabled=true
# Interval in milliseconds (default: 600000 = 10 minutes) to reduce log noise
notifications.outbox.retry.interval-ms=600000
notifications.outbox.retry.max-attempts=3
notifications.outbox.cleanup.cron=0 0 3 * * ?

# ==========================================================================
# Processing Lock Configuration
# ==========================================================================
notifications.processing-lock.ttl-seconds=120
notifications.processing-lock.cleanup-age-seconds=300

# ==========================================================================
# Recovery Scheduler Configuration
# ==========================================================================
notifications.recovery.enabled=true
notifications.recovery.stuck-minutes=5
notifications.recovery.batch-size=200
notifications.recovery.stuck-seconds=120
notifications.self-healing.cleanup-locks.enabled=true

# ==========================================================================
# Push Circuit Breaker Configuration
# ==========================================================================
notifications.push-circuit.enabled=true
notifications.push-circuit.failure-rate-threshold=0.30
notifications.push-circuit.min-samples=30
notifications.push-circuit.cooldown-seconds=120
notifications.push-circuit.window-seconds=60

# ==========================================================================
# Alert Thresholds (Admin Observability)
# ==========================================================================
notifications.alert.dlq-size-threshold=100
notifications.alert.queue-delay-threshold-seconds=30
notifications.alert.push-failure-rate-threshold=0.01
notifications.alert.sla-failed-threshold=1

# ==========================================================================
# SYSTEM HARD LIMITS (Non-negotiable production limits)
# Reference: HARD_LIMITS.md
# ==========================================================================

# Maximum queue size (hard limit - ingestion rejects with 429)
notifications.system.max-queue-size=10000
notifications.system.max-queue-size-critical=1000
notifications.system.max-queue-size-normal=7000
notifications.system.max-queue-size-low=2000

# Maximum queue age (hard limit)
notifications.system.max-queue-age-seconds=300
notifications.system.max-queue-age-critical-seconds=30

# Maximum DLQ size (hard limit - throttling starts at 150, stop at 200)
notifications.system.max-dlq-size=100
notifications.system.max-dlq-size-hard-stop=200

# Processing throughput limits
notifications.system.max-ingestion-rate=100
notifications.system.max-burst-rate=200
notifications.system.min-processing-rate=20

# Inflight limits
notifications.system.max-inflight=500
notifications.system.max-inflight-hard-stop=800

# Backpressure thresholds (percentage of max)
notifications.system.backpressure-threshold-percent=70
notifications.system.ingestion-pause-threshold-percent=90

# Priority-Based Rejection (graceful degradation under load)
notifications.priority.rejection.enabled=true
notifications.priority.rejection.low-threshold-percent=70
notifications.priority.rejection.normal-threshold-percent=85
# CRITICAL is always accepted (unless queue is 100% full)

# ==========================================================================
# JWT Configuration (for securing API endpoints)
# MUST be overridden via environment variable or application-dev.properties
# ==========================================================================
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION_MS:172800000}

# ==========================================================================
# Internal API Authentication (Service-to-Service)
# MUST be overridden via environment variable or application-dev.properties
# ==========================================================================
# Default key for local development - MUST match backend's notifications.external.api-key
internal.api.keys=${INTERNAL_API_KEYS:arpay-internal-key-change-in-production}
internal.api.header=X-API-Key
internal.api.excluded-paths=/actuator/**,/api/notifications/tokens/**

# ==========================================================================
# CORS Configuration
# ==========================================================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:8080,https://arpay.anantarealty.in,https://api.arpay.anantarealty.in,https://notify.arpay.anantarealty.in}

# ==========================================================================
# Actuator & Metrics
# ==========================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}
management.endpoint.prometheus.enabled=true
# Security note: CVE-2026-22733 (CloudFoundry actuator auth bypass) and CVE-2026-22731
# (health-group additional-path auth bypass) are not applicable to this deployment:
#   - App runs on Coolify/Docker, not CloudFoundry (no VCAP_APPLICATION present)
#   - No management.endpoint.health.group.*.additional-path is configured
# Both CVEs will be fully patched when Spring Boot 3.4.15+ is released on Maven Central.

# ==========================================================================
# Logging Configuration
# ==========================================================================
logging.level.root=INFO
logging.level.com.arpay=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.data.redis=WARN

# Debug logging for notification processing
# logging.level.com.arpay.notification=DEBUG
# logging.level.com.arpay.service=DEBUG

# ==========================================================================
# Arpay Backend URL (for fetching user data if needed)
# ==========================================================================
arpay.backend.base-url=${ARPAY_BACKEND_URL:http://localhost:8080}
