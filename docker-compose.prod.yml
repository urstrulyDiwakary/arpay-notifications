# =============================================================================
# ARPAY Notifications - Docker Compose for Production
# Optimized for Coolify deployment on Hostinger VPS
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application Service - Production Optimized
  # ---------------------------------------------------------------------------
  app:
    image: arpay-notifications:${APP_VERSION:-latest}
    container_name: arpay-notifications-app
    restart: always
    ports:
      - "${APP_PORT:-8086}:8086"
    environment:
      # Spring Profile
      - SPRING_PROFILES_ACTIVE=production
      
      # Server Configuration
      - SERVER_PORT=8086
      
      # Database Configuration
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:${DB_PORT:-5432}/${DB_NAME:-ARPAY}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      
      # Redis Configuration
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # Firebase Configuration
      - FIREBASE_ENABLED=true
      - FIREBASE_SERVICE_ACCOUNT_KEY_PATH=/app/firebase/firebase-service-account.json
      
      # JWT Security - MUST be set in production
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=172800000
      
      # Internal API Authentication - MUST be set in production
      - INTERNAL_API_KEYS=${INTERNAL_API_KEYS}
      
      # Email Configuration
      - SPRING_MAIL_HOST=${MAIL_HOST}
      - SPRING_MAIL_PORT=${MAIL_PORT:-587}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      
      # CORS Configuration - Production domains only
      - CORS_ORIGINS=${CORS_ORIGINS}
      
      # Rate Limiting - Production settings
      - NOTIFICATIONS_RATELIMIT_ENABLED=true
      - NOTIFICATIONS_RATELIMIT_GLOBAL_PERMITS_PER_SECOND=1000
      - NOTIFICATIONS_RATELIMIT_PER_ENDPOINT_PERMITS_PER_SECOND=100
      - NOTIFICATIONS_RATELIMIT_PER_CLIENT_PERMITS_PER_SECOND=10
      
      # Logging - Production level
      - LOGGING_LEVEL_ROOT=INFO
      - LOGGING_LEVEL_COM_ARPAY=INFO
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB=WARN
      - LOGGING_LEVEL_ORG_HIBERNATE=WARN
      
      # SSL Configuration (if using HTTPS directly)
      - SERVER_SSL_ENABLED=${SERVER_SSL_ENABLED:-false}
      - SERVER_SSL_KEY_STORE=${SERVER_SSL_KEY_STORE:-}
      - SERVER_SSL_KEY_STORE_PASSWORD=${SERVER_SSL_KEY_STORE_PASSWORD:-}
      - SERVER_SSL_KEY_ALIAS=${SERVER_SSL_KEY_ALIAS:-}
    volumes:
      # Mount Firebase credentials
      - ${FIREBASE_KEY_PATH:-./firebase}:/app/firebase:ro
      # Mount logs
      - app-logs:/app/logs
    networks:
      - arpay-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ---------------------------------------------------------------------------
  # PostgreSQL Database - Production Configuration
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: arpay-notifications-postgres
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-ARPAY}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups/postgres:/backups:rw
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - arpay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Redis Cache - Production Configuration
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: arpay-notifications-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --protected-mode yes
    volumes:
      - redis-data:/data
      - ./backups/redis:/backups:rw
    networks:
      - arpay-network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

# =============================================================================
# Networks
# =============================================================================
networks:
  arpay-network:
    driver: bridge
    name: arpay-notifications-network
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    name: arpay-notifications-postgres-data
  redis-data:
    name: arpay-notifications-redis-data
  app-logs:
    name: arpay-notifications-app-logs
